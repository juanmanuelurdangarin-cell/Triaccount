<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DivideGastos Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #161920; --surface2: #1e2230; --border: #2a2f40;
    --accent: #6c63ff; --accent2: #ff6584; --green: #1de9b6; --red: #ff6584;
    --text: #e8eaf0; --muted: #7a7f99; --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
  
  .screen { display: none; min-height: 100vh; flex-direction: column; animation: fadeIn 0.3s ease; }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* HEADER */
  header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(22,25,32,0.8); backdrop-filter: blur(10px); sticky: top; z-index: 100; border-bottom: 1px solid var(--border); }
  .user-badge { display: flex; align-items: center; gap: 8px; background: var(--surface2); padding: 4px 12px 4px 4px; border-radius: 30px; border: 1px solid var(--border); }
  .user-badge img { width: 26px; height: 26px; border-radius: 50%; }

  /* CONTENIDO */
  .container { padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; flex: 1; }
  h2 { font-family: 'Syne'; font-weight: 800; font-size: 1.8rem; margin-bottom: 20px; }
  
  .event-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; position: relative; }
  .event-card:active { transform: scale(0.98); background: var(--surface2); }
  .event-card::after { content: '\f054'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.8rem; }

  /* BOTÓN FLOTANTE */
  .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 50%; border: none; font-size: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); z-index: 90; display: flex; align-items: center; justify-content: center; cursor: pointer; }

  /* MODALES */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: flex-end; z-index: 1000; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--surface); width: 100%; border-radius: 24px 24px 0 0; padding: 30px 20px; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  
  input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 16px; border-radius: 12px; color: white; margin-bottom: 15px; font-size: 1rem; outline: none; }
  .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
  .btn-primary { background: var(--accent); color: white; }
  
  /* LOADING */
  #screen-loading { justify-content: center; align-items: center; position: fixed; inset: 0; z-index: 9999; background: var(--bg); }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

  <div id="screen-loading" class="screen active"><div class="spinner"></div></div>

  <div id="screen-onboarding" class="screen">
    <div style="margin: auto; text-align: center; padding: 40px;">
      <i class="fa-solid fa-receipt fa-4x" style="color:var(--accent); margin-bottom:20px"></i>
      <h1 style="font-family:'Syne'; font-size: 2.5rem; margin-bottom: 10px;">DivideGastos</h1>
      <p style="color:var(--muted); margin-bottom:30px">Ingreso seguro con Google</p>
      <button class="btn" style="background:white; color:black; display:flex; align-items:center; justify-content:center; gap:10px" onclick="login()">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18"> Continuar con Google
      </button>
    </div>
  </div>

  <div id="screen-main" class="screen">
    <header>
      <div class="user-badge">
        <img id="user-photo" src="">
        <span id="user-name">...</span>
      </div>
      <button onclick="logout()" style="background:none; border:none; color:var(--red)"><i class="fa-solid fa-power-off"></i></button>
    </header>
    <div class="container">
      <h2>Mis Eventos</h2>
      <div id="event-list"></div>
    </div>
    <button class="fab" onclick="openModal('modal-new')"><i class="fa-solid fa-plus"></i></button>
  </div>

  <div id="modal-new" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-new')">
    <div class="modal">
      <h2 style="font-size:1.4rem">Crear Evento</h2>
      <input type="text" id="new-ev-name" placeholder="Nombre (ej: Asado del viernes)">
      <select id="new-ev-currency">
        <option value="ARS">Pesos (ARS)</option>
        <option value="USD">Dólares (USD)</option>
        <option value="EUR">Euros (EUR)</option>
      </select>
      <button class="btn btn-primary" onclick="createEvent()">Comenzar</button>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + id).classList.add('active');
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    // --- SESIÓN ---
    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('user-name').innerText = user.displayName.split(' ')[0];
        document.getElementById('user-photo').src = user.photoURL;
        showScreen('main');
        loadEvents();
      } else {
        showScreen('onboarding');
      }
      document.getElementById('screen-loading').classList.remove('active');
    });

    async function login() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try { await auth.signInWithPopup(provider); } catch(e) { alert(e.message); }
    }

    function logout() { auth.signOut(); }

    // --- FIRESTORE ---
    function loadEvents() {
      db.collection('events')
        .where('participantsIds', 'array-contains', auth.currentUser.uid)
        .orderBy('createdAt', 'desc')
        .onSnapshot(snap => {
          const list = document.getElementById('event-list');
          if (snap.empty) {
            list.innerHTML = '<div style="text-align:center; margin-top:40px; color:var(--muted)">No tienes eventos creados.</div>';
            return;
          }
          list.innerHTML = snap.docs.map(doc => {
            const data = doc.data();
            return `
              <div class="event-card" onclick="alert('Abriendo: ${data.name}')">
                <div style="font-size:0.7rem; color:var(--accent); font-weight:bold; margin-bottom:5px">
                  ${data.ownerId === auth.currentUser.uid ? 'ERES EL DUEÑO' : 'CREADO POR ' + data.ownerName.toUpperCase()}
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center">
                  <div style="font-weight:700">${data.name}</div>
                  <div style="color:var(--muted); font-size:0.9rem">${data.currency}</div>
                </div>
              </div>
            `;
          }).join('');
        }, err => console.error(err));
    }

    async function createEvent() {
      const name = document.getElementById('new-ev-name').value;
      const currency = document.getElementById('new-ev-currency').value;
      if (!name) return;

      const user = auth.currentUser;
      await db.collection('events').add({
        name: name,
        currency: currency,
        ownerId: user.uid,
        ownerName: user.displayName,
        participantsIds: [user.uid],
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        logs: [{user: user.displayName, action: "creó el evento", date: Date.now()}]
      });

      closeModal('modal-new');
      document.getElementById('new-ev-name').value = '';
    }
  </script>
</body>
</html>
