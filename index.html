<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivideGastos Fix</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root { --primary: #6c63ff; --bg: #f0f2f8; --text: #2d3142; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; }
  .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
  .screen.active { display: flex; }
  #debug-console { position: fixed; bottom: 0; left: 0; right: 0; background: #000; color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; max-height: 120px; overflow-y: auto; z-index: 1000; opacity: 0.9; }
  .btn-google { padding: 15px 25px; background: white; border: 2px solid #ddd; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  .app-header { background: white; width: 100%; padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; position: fixed; top: 0; box-sizing: border-box; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>

  <div id="debug-console">Iniciando sistema de diagnóstico...</div>

  <div id="screen-loading" class="screen active">
    <i class="fa-solid fa-sync fa-spin fa-3x" style="color:var(--primary)"></i>
    <p style="margin-top:20px">Sincronizando con Google...</p>
  </div>

  <div id="screen-onboarding" class="screen">
    <i class="fa-solid fa-receipt fa-4x" style="color:var(--primary); margin-bottom:20px"></i>
    <h1>DivideGastos</h1>
    <p style="color:#666; margin-bottom:30px">Presioná el botón para ingresar</p>
    <button class="btn-google" onclick="login()">
      <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20">
      Entrar con Google
    </button>
  </div>

  <div id="screen-main" class="screen">
    <header class="app-header">
      <span id="user-display">Cargando...</span>
      <button onclick="logout()" style="border:none; background:none; color:red; font-weight:bold">Cerrar Sesión</button>
    </header>
    <i class="fa-solid fa-check-circle fa-4x" style="color:green; margin-bottom:20px"></i>
    <h2>¡Acceso Correcto!</h2>
    <p id="user-email"></p>
  </div>

  <script>
    const debug = (msg) => {
      const el = document.getElementById('debug-console');
      el.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
      el.scrollTop = el.scrollHeight;
      console.log(msg);
    };

    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + id).classList.add('active');
    }

    function init() {
      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      
      debug("Firebase listo. Verificando persistencia...");

      // Forzar que la sesión se guarde localmente pase lo que pase
      auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => {
        
        // El observador es el que manda
        auth.onAuthStateChanged((user) => {
          if (user) {
            debug("¡USUARIO DETECTADO!: " + user.email);
            document.getElementById('user-display').innerText = user.displayName;
            document.getElementById('user-email').innerText = user.email;
            showScreen('main');
          } else {
            debug("No hay sesión activa.");
            // Antes de mostrar login, vemos si estamos volviendo de un redirect
            auth.getRedirectResult().then(result => {
               if (!result.user) {
                 debug("No se encontró usuario en el redirect. Al login.");
                 showScreen('onboarding');
               }
            }).catch(e => {
               debug("Error en redirect result: " + e.message);
               showScreen('onboarding');
            });
          }
        });
      });
    }

    function login() {
      debug("Redirigiendo a Google...");
      const provider = new firebase.auth.GoogleAuthProvider();
      // Esto ayuda a que el navegador no "olvide" la operación al redirigir
      firebase.auth().signInWithRedirect(provider);
    }

    function logout() {
      firebase.auth().signOut().then(() => {
        debug("Sesión cerrada.");
        window.location.reload();
      });
    }

    // Usamos DOMContentLoaded para asegurar que todo el HTML esté listo
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
