<script>
    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentEvent = null;
    let activeTab = 'gastos';
    let tempParticipants = [];

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(id);
        if(target) target.classList.add('active');
        document.getElementById('screen-loading').style.display = 'none';
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('header-name').innerText = user.displayName.split(' ')[0];
            document.getElementById('header-img').src = user.photoURL;
            const params = new URLSearchParams(window.location.search);
            if(params.has('join')) joinEvent(params.get('join'));
            else { showScreen('screen-main'); loadEvents(); }
        } else { showScreen('screen-login'); }
    });

    async function login() { 
        try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); } 
        catch(e) { alert("Error al ingresar: Permití los popups en tu navegador."); }
    }
    
    function logout() { auth.signOut().then(() => window.location.href = window.location.origin + window.location.pathname); }

    function openModalCreate() {
        tempParticipants = [{id: auth.currentUser.uid, name: auth.currentUser.displayName, photo: auth.currentUser.photoURL, isRealUser: true}];
        renderSetupParts();
        openModal('modal-new-event');
    }

    function addPartToSetup() {
        const input = document.getElementById('in-part-name');
        if(!input.value.trim()) return;
        tempParticipants.push({id: 'temp_' + Date.now() + Math.random(), name: input.value.trim(), photo: null, isRealUser: false});
        input.value = '';
        renderSetupParts();
    }

    function removePartFromSetup(id) {
        if(id === auth.currentUser.uid) return;
        tempParticipants = tempParticipants.filter(p => p.id !== id);
        renderSetupParts();
    }

    function renderSetupParts() {
        document.getElementById('setup-parts-list').innerHTML = tempParticipants.map(p => `
            <span class="part-chip">
                ${p.name} ${p.id !== auth.currentUser.uid ? `<i class="fa-solid fa-circle-xmark" onclick="removePartFromSetup('${p.id}')"></i>` : ''}
            </span>
        `).join('');
    }

    function loadEvents() {
        // Esta es la parte clave: Filtramos por tu UID de Google
        db.collection('events').where('participantsIds', 'array-contains', auth.currentUser.uid)
        .onSnapshot(snap => {
            const list = document.getElementById('event-list');
            if(snap.empty) {
                list.innerHTML = `<div style="text-align:center; padding:50px; color:var(--muted);"><i class="fa-solid fa-folder-open fa-3x"></i><p style="margin-top:15px;">No tenés eventos.<br>Tocá el + para empezar.</p></div>`;
                return;
            }
            list.innerHTML = snap.docs.map(doc => `
                <div class="card" onclick="openEvent('${doc.id}')">
                    <b style="color:white;">${doc.data().name}</b><br>
                    <small style="color:var(--accent); font-weight:bold;">${doc.data().currency}</small> • 
                    <small style="color:var(--muted)">${doc.data().participants.length} personas</small>
                </div>
            `).join('');
        }, err => {
            console.error("Error cargando eventos:", err);
        });
    }

    async function dbCreateEvent() {
        const name = document.getElementById('new-name').value;
        const btn = document.getElementById('btn-create');
        if(!name || btn.disabled) return;
        btn.disabled = true;
        
        try {
            // Guardamos el evento asegurando que TU uid esté en participantsIds
            const doc = await db.collection('events').add({
                name: name, 
                currency: document.getElementById('new-cur').value,
                participantsIds: tempParticipants.map(p => p.id).concat([auth.currentUser.uid]), // Refuerzo de ID
                participants: tempParticipants,
                expenses: [],
                logs: [{u: auth.currentUser.displayName, a: "creó el evento", d: Date.now()}],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            closeModal('modal-new-event');
            document.getElementById('new-name').value = '';
            openEvent(doc.id);
        } catch(e) { alert("Error al guardar: " + e.message); }
        finally { btn.disabled = false; }
    }

    function openEvent(id) {
        db.collection('events').doc(id).onSnapshot(doc => {
            if(!doc.exists) return;
            currentEvent = {id: doc.id, ...doc.data()};
            document.getElementById('det-title').innerText = currentEvent.name;
            renderExpenseForm();
            renderTab();
            showScreen('screen-detail');
        });
    }

    function renderExpenseForm() {
        document.getElementById('ex-payer').innerHTML = currentEvent.participants.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        document.getElementById('ex-list').innerHTML = currentEvent.participants.map(p => `
            <label style="display:flex; align-items:center; gap:10px; padding:12px; background:var(--surface2); border-radius:10px; margin-bottom:8px; cursor:pointer;">
                <input type="checkbox" value="${p.id}" checked class="ex-check"> 
                <span style="font-size:0.9rem;">${p.name}</span>
            </label>
        `).join('');
    }

    async function dbAddExpense() {
        const desc = document.getElementById('ex-desc').value;
        const amount = parseFloat(document.getElementById('ex-amount').value);
        const payerId = document.getElementById('ex-payer').value;
        const included = Array.from(document.querySelectorAll('.ex-check:checked')).map(c => c.value);
        if(!desc || isNaN(amount) || !included.length) return alert("Completá todos los datos del gasto");

        const expense = { 
            id: Date.now(), desc, amount, payerId, includedIds: included, 
            payerName: currentEvent.participants.find(p => p.id === payerId).name, 
            date: Date.now() 
        };

        await db.collection('events').doc(currentEvent.id).update({
            expenses: firebase.firestore.FieldValue.arrayUnion(expense),
            logs: firebase.firestore.FieldValue.arrayUnion({u: auth.currentUser.displayName, a: `sumó ${desc} ($${amount})`, d: Date.now()})
        });
        
        document.getElementById('ex-desc').value = '';
        document.getElementById('ex-amount').value = '';
        closeModal('modal-add-expense');
    }

    function switchTab(t, btn) {
        activeTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTab();
    }

    function renderTab() {
        const area = document.getElementById('tab-area');
        if(activeTab === 'gastos') {
            area.innerHTML = currentEvent.expenses.length ? currentEvent.expenses.map(e => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; border-left: 4px solid var(--green);">
                    <div><b>${e.desc}</b><br><small style="color:var(--muted)">Pagó: ${e.payerName}</small></div>
                    <div style="color:var(--green); font-weight:800;">$${e.amount}</div>
                </div>
            `).join('') : '<p style="text-align:center; color:var(--muted); padding:40px;">No hay gastos cargados todavía.</p>';
        } else if(activeTab === 'historial') {
            area.innerHTML = currentEvent.logs.slice().reverse().map(l => `
                <div style="padding:12px 0; border-bottom:1px solid var(--border); font-size:0.85rem;">
                    <b style="color:var(--accent)">${l.u}</b> ${l.a}<br>
                    <small style="color:var(--muted)">${new Date(l.d).toLocaleString()}</small>
                </div>
            `).join('');
        } else {
            area.innerHTML = `<div style="text-align:center; padding:40px; color:var(--muted)">La pestaña <b>${activeTab.toUpperCase()}</b> estará lista en la próxima actualización.</div>`;
        }
    }

    function shareEvent() {
        const url = window.location.origin + window.location.pathname + "?join=" + currentEvent.id;
        if(navigator.share) navigator.share({title: currentEvent.name, url});
        else prompt("Copiá este link para invitar amigos:", url);
    }

    async function joinEvent(id) {
        const ref = db.collection('events').doc(id);
        const doc = await ref.get();
        if(doc.exists) {
            const data = doc.data();
            if(!data.participantsIds.includes(auth.currentUser.uid)) {
                await ref.update({
                    participantsIds: firebase.firestore.FieldValue.arrayUnion(auth.currentUser.uid),
                    participants: firebase.firestore.FieldValue.arrayUnion({
                        id: auth.currentUser.uid, 
                        name: auth.currentUser.displayName, 
                        photo: auth.currentUser.photoURL
                    }),
                    logs: firebase.firestore.FieldValue.arrayUnion({u: auth.currentUser.displayName, a: "se unió vía link", d: Date.now()})
                });
            }
            window.history.replaceState({}, '', window.location.pathname);
            openEvent(id);
        }
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
</script>
