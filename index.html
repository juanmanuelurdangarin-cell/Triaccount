<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DivideGastos Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f40;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #1de9b6;
    --red: #ff6584;
    --text: #e8eaf0;
    --muted: #7a7f99;
    --radius: 16px;
    --radius-sm: 10px;
    --pedidosya: #ff0045;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; overflow-x: hidden; }

  /* --- SCREENS --- */
  .screen { display: none; min-height: 100vh; flex-direction: column; animation: fadeIn 0.3s ease; }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  /* --- ONBOARDING / LOGIN --- */
  #screen-onboarding { justify-content: center; align-items: center; padding: 30px; text-align: center; background: radial-gradient(circle at top right, #1e1e30, var(--bg)); }
  .login-card { background: var(--surface); border: 1px solid var(--border); padding: 40px 30px; border-radius: 24px; width: 100%; max-width: 400px; }
  .logo-icon { font-size: 3.5rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
  .btn-google { width: 100%; padding: 16px; background: white; color: #1a1a1a; border: none; border-radius: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: 0.2s; margin-top: 30px; }
  .btn-google:active { transform: scale(0.97); }

  /* --- HEADER --- */
  header { padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(13,15,20,0.8); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--border); }
  .user-badge { display: flex; align-items: center; gap: 10px; background: var(--surface); padding: 6px 14px 6px 6px; border-radius: 40px; border: 1px solid var(--border); }
  .user-badge img { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--accent); }
  .btn-logout { background: none; border: none; color: var(--red); font-size: 1.2rem; cursor: pointer; padding: 5px; }

  /* --- APP CONTENT (Basado en tu archivo .txt) --- */
  .container { padding: 20px; flex: 1; max-width: 600px; margin: 0 auto; width: 100%; }
  h2 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.6rem; margin-bottom: 20px; }
  
  .history-list { display: flex; flex-direction: column; gap: 12px; }
  .event-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
  .event-card:active { background: var(--surface2); transform: scale(0.98); }
  .event-name { font-weight: 600; font-size: 1.1rem; color: var(--text); }
  .event-meta { font-size: 0.85rem; color: var(--muted); }
  .event-total { font-weight: 700; color: var(--accent); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state i { font-size: 3rem; margin-bottom: 15px; opacity: 0.3; }

  /* BOTÓN FLOTANTE */
  .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--accent); color: white; border-radius: 50%; border: none; font-size: 24px; box-shadow: 0 8px 24px rgba(108,99,255,0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 90; }

  /* LOADING */
  #screen-loading { justify-content: center; align-items: center; background: var(--bg); }
  .spinner { width: 45px; height: 45px; border: 4px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MODALES (Simplificados para esta versión) */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: flex-end; z-index: 1000; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); width: 100%; border-radius: 24px 24px 0 0; padding: 30px 20px; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .input-group { margin-bottom: 20px; }
  label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 0.9rem; }
  input { width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 15px; border-radius: var(--radius-sm); color: white; font-size: 1rem; outline: none; }
  input:focus { border-color: var(--accent); }
  .btn-primary { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; }

</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

  <div id="screen-loading" class="screen active">
    <div class="spinner"></div>
  </div>

  <div id="screen-onboarding" class="screen">
    <div class="login-card">
      <div class="logo-icon"><i class="fa-solid fa-receipt"></i></div>
      <h1 style="font-family:'Syne'; font-weight:800; font-size:2rem">DivideGastos</h1>
      <p style="color:var(--muted)">La forma pro de repartir deudas</p>
      <button class="btn-google" onclick="login()">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20">
        Continuar con Google
      </button>
    </div>
  </div>

  <div id="screen-main" class="screen">
    <header>
      <div class="user-badge">
        <img id="user-photo" src="" alt="">
        <span id="user-name">Usuario</span>
      </div>
      <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i></button>
    </header>

    <div class="container">
      <h2>Mis Eventos</h2>
      <div id="event-list" class="history-list">
        </div>
    </div>

    <button class="fab" onclick="openNewEventModal()"><i class="fa-solid fa-plus"></i></button>
  </div>

  <div id="modal-new-event" class="modal-overlay">
    <div class="modal">
      <h2 style="margin-bottom:20px">Nuevo Evento</h2>
      <div class="input-group">
        <label>¿Cómo se llama el evento?</label>
        <input type="text" id="new-event-name" placeholder="Ej: Asado, Viaje, Cena...">
      </div>
      <button class="btn-primary" onclick="createNewEvent()">Crear Evento</button>
      <button onclick="closeModal('modal-new-event')" style="width:100%; background:none; border:none; color:var(--muted); margin-top:15px; cursor:pointer">Cancelar</button>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };

    let auth, db;
    let events = []; // Aquí vivirá tu lógica de gastos

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + id).classList.add('active');
    }

    function init() {
      firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();

      auth.onAuthStateChanged(user => {
        if (user) {
          document.getElementById('user-name').innerText = user.displayName.split(' ')[0];
          document.getElementById('user-photo').src = user.photoURL;
          showScreen('main');
          renderHistory();
        } else {
          showScreen('onboarding');
        }
      });
    }

    async function login() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
      } catch (e) {
        console.error(e);
      }
    }

    function logout() {
      if(confirm("¿Querés cerrar sesión?")) auth.signOut();
    }

    // LÓGICA DE EVENTOS (Basada en tu archivo avanzado)
    function renderHistory() {
      const list = document.getElementById('event-list');
      if (events.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-folder-open"></i>
            <p>No hay eventos creados todavía.</p>
          </div>`;
        return;
      }
      
      list.innerHTML = events.map(e => `
        <div class="event-card" onclick="alert('Próximamente: Detalle de '+ '${e.name}')">
          <div>
            <div class="event-name">${e.name}</div>
            <div class="event-meta">${new Date().toLocaleDateString()}</div>
          </div>
          <div class="event-total">$0.00</div>
        </div>
      `).join('');
    }

    function openNewEventModal() {
      document.getElementById('modal-new-event').classList.add('open');
      document.getElementById('new-event-name').focus();
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
    }

    function createNewEvent() {
      const name = document.getElementById('new-event-name').value;
      if (!name) return;
      
      const newEvent = {
        id: Date.now(),
        name: name,
        participants: [],
        expenses: []
      };
      
      events.unshift(newEvent);
      closeModal('modal-new-event');
      document.getElementById('new-event-name').value = '';
      renderHistory();
    }

    window.onload = init;
  </script>
</body>
</html>
