<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DivideGastos Pro | vMaster 3.2</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0d0f14; --surface: #161920; --surface2: #1e2230; --border: #2a2f40;
        --accent: #ff0045; --accent-soft: rgba(255, 0, 69, 0.15);
        --green: #1de9b6; --red: #ff6584; --text: #e8eaf0; --muted: #7a7f99; --radius: 20px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }
    
    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; height: 75px; }
    .user-box { display: flex; align-items: center; gap: 12px; }
    .user-box img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }

    .container { padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 15px; cursor: pointer; }
    
    .tabs-nav { display: flex; background: var(--surface2); padding: 5px; border-radius: 18px; margin-bottom: 20px; gap: 4px; overflow-x: auto; scrollbar-width: none; }
    .tab-btn { flex: 1; min-width: 85px; padding: 12px 8px; border: none; background: none; color: var(--muted); font-weight: 700; cursor: pointer; border-radius: 14px; font-size: 0.65rem; text-transform: uppercase; }
    .tab-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(255, 0, 69, 0.3); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.94); display: none; align-items: flex-end; z-index: 1000; padding: 10px; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--surface); width: 100%; border-radius: 30px; padding: 25px; max-height: 92vh; overflow-y: auto; border: 1px solid var(--border); }
    
    input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 18px; border-radius: 16px; color: white; margin-bottom: 18px; font-size: 1rem; outline: none; }
    .btn-main { width: 100%; padding: 20px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; background: var(--accent); color: white; font-size: 1rem; text-transform: uppercase; }

    .check-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--surface2); border-radius: 16px; margin-bottom: 10px; border: 1px solid transparent; }
    .check-item input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--accent); }

    .fab { position: fixed; bottom: 30px; right: 25px; width: 68px; height: 68px; background: var(--accent); color: white; border-radius: 50%; border: none; font-size: 30px; box-shadow: 0 12px 30px rgba(255, 0, 69, 0.4); z-index: 90; display: flex; align-items: center; justify-content: center; }

    #screen-loading { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .loader { width: 45px; height: 45px; border: 4px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="screen-loading"><div class="loader"></div></div>

<div id="screen-login" class="screen">
    <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:40px; text-align:center;">
        <i class="fa-solid fa-bolt-lightning fa-5x" style="color:var(--accent); margin-bottom:20px;"></i>
        <h1 style="font-family:'Syne'; font-size:2.8rem; font-weight:800; line-height:0.9;">Divide<br><span style="color:var(--accent)">PRO</span></h1>
        <button class="btn-main" style="margin-top:40px;" onclick="login()">Ingresar con Google</button>
    </div>
</div>

<div id="screen-main" class="screen">
    <header>
        <div class="user-box"><img id="header-img" src=""><span id="header-name" style="font-weight:800; font-family:'Syne';">Manuel</span></div>
        <button onclick="logout()" style="background:none; border:none; color:var(--muted);"><i class="fa-solid fa-power-off"></i></button>
    </header>
    <div class="container">
        <h2 style="font-family:'Syne'; margin-bottom:25px;">Mis Eventos</h2>
        <div id="event-list"></div>
    </div>
    <button class="fab" onclick="openModalCreate()"><i class="fa-solid fa-plus"></i></button>
</div>

<div id="screen-detail" class="screen">
    <header>
        <button onclick="showScreen('screen-main')" style="background:none; border:none; color:white;"><i class="fa-solid fa-arrow-left"></i></button>
        <h3 id="det-title" style="font-family:'Syne'; flex:1; text-align:center;">Evento</h3>
        <button onclick="shareEvent()" style="background:none; border:none; color:var(--accent);"><i class="fa-solid fa-share-nodes"></i></button>
    </header>
    <div class="container">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('gastos', this)">Gastos</button>
            <button class="tab-btn" onclick="switchTab('saldos', this)">Saldos</button>
            <button class="tab-btn" onclick="switchTab('transfer', this)">Transfer</button>
            <button class="tab-btn" onclick="switchTab('historial', this)">Log</button>
        </div>
        <div id="tab-area"></div>
    </div>
    <button class="fab" id="fab-detail" onclick="openModal('modal-add-expense')"><i class="fa-solid fa-receipt"></i></button>
</div>

<div id="modal-new-event" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-new-event')">
    <div class="modal">
        <h2 style="font-family:'Syne'; margin-bottom:20px;">Nuevo Evento</h2>
        <input type="text" id="new-name" placeholder="Nombre del evento">
        <div id="setup-parts-list" style="margin-bottom:15px; display:flex; flex-wrap:wrap; gap:8px;"></div>
        <div style="display:flex; gap:10px; margin-bottom:25px;">
            <input type="text" id="in-part-name" placeholder="Amigo + Enter" onkeypress="if(event.key==='Enter')addPartToSetup()" style="margin-bottom:0;">
            <button onclick="addPartToSetup()" style="background:var(--accent); border:none; color:white; width:60px; border-radius:16px;"><i class="fa-solid fa-plus"></i></button>
        </div>
        <button class="btn-main" onclick="dbCreateEvent()">Crear Evento</button>
    </div>
</div>

<div id="modal-add-expense" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-add-expense')">
    <div class="modal">
        <h2 style="margin-bottom:20px; font-family:'Syne';">Cargar Gasto</h2>
        <input type="text" id="ex-desc" placeholder="¿Qué compraron?">
        <input type="number" id="ex-amount" placeholder="Monto total ($)">
        <select id="ex-payer"></select>
        <div id="ex-list-checks" style="margin-bottom:30px;"></div>
        <button class="btn-main" onclick="dbAddExpense()">Guardar Gasto</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Formateador Argentino: $ 1.234,56
    const fmt = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' });

    let currentEvent = null, activeTab = 'gastos', tempParticipants = [];

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('screen-loading').style.display = 'none';
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('header-name').innerText = user.displayName.split(' ')[0];
            document.getElementById('header-img').src = user.photoURL;
            showScreen('screen-main');
            loadEvents();
        } else { showScreen('screen-login'); }
    });

    async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }

    function openModalCreate() {
        tempParticipants = [{id: auth.currentUser.uid, name: auth.currentUser.displayName}];
        renderSetupParts();
        openModal('modal-new-event');
    }

    function addPartToSetup() {
        const inp = document.getElementById('in-part-name');
        if(!inp.value.trim()) return;
        tempParticipants.push({id: 't_' + Date.now(), name: inp.value.trim()});
        inp.value = '';
        renderSetupParts();
    }

    function renderSetupParts() {
        document.getElementById('setup-parts-list').innerHTML = tempParticipants.map(p => `
            <div style="background:var(--accent-soft); color:var(--accent); padding:8px 15px; border-radius:12px; font-weight:700;">${p.name}</div>
        `).join('');
    }

    function loadEvents() {
        db.collection('events').where('participantsIds', 'array-contains', auth.currentUser.uid)
        .onSnapshot(snap => {
            const list = document.getElementById('event-list');
            list.innerHTML = snap.empty ? '<p style="text-align:center; padding:40px; opacity:0.5;">No hay eventos guardados.</p>' : 
            snap.docs.map(doc => `<div class="card" onclick="openEvent('${doc.id}')"><h4 style="font-family:'Syne'; color:white;">${doc.data().name}</h4></div>`).join('');
        });
    }

    async function dbCreateEvent() {
        const name = document.getElementById('new-name').value;
        if(!name) return;
        const ids = tempParticipants.map(p => p.id);
        if(!ids.includes(auth.currentUser.uid)) ids.push(auth.currentUser.uid);

        // CIERRE INMEDIATO PREVENTIVO
        closeModal('modal-new-event');

        try {
            await db.collection('events').add({
                name, participantsIds: ids, participants: tempParticipants, expenses: [],
                logs: [{u: auth.currentUser.displayName, a: "creó el evento", d: Date.now()}]
            });
        } catch(e) { console.error(e); }
    }

    function openEvent(id) {
        db.collection('events').doc(id).onSnapshot(doc => {
            if(!doc.exists) return;
            currentEvent = {id: doc.id, ...doc.data()};
            document.getElementById('det-title').innerText = currentEvent.name;
            renderExpenseForm();
            renderTab();
            showScreen('screen-detail');
        });
    }

    function renderExpenseForm() {
        document.getElementById('ex-payer').innerHTML = currentEvent.participants.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        document.getElementById('ex-list-checks').innerHTML = currentEvent.participants.map(p => `
            <div class="check-item"><span>${p.name}</span><input type="checkbox" value="${p.id}" checked class="ex-check"></div>
        `).join('');
    }

    async function dbAddExpense() {
        const desc = document.getElementById('ex-desc').value, amount = parseFloat(document.getElementById('ex-amount').value);
        if(!desc || isNaN(amount)) return;
        const payerId = document.getElementById('ex-payer').value, included = Array.from(document.querySelectorAll('.ex-check:checked')).map(c => c.value);

        // CIERRE INMEDIATO PREVENTIVO
        closeModal('modal-add-expense');

        try {
            await db.collection('events').doc(currentEvent.id).update({
                expenses: firebase.firestore.FieldValue.arrayUnion({ 
                    id: Date.now(), desc, amount, payerId, includedIds: included, 
                    payerName: currentEvent.participants.find(p => p.id === payerId).name, d: Date.now() 
                }),
                logs: firebase.firestore.FieldValue.arrayUnion({u: auth.currentUser.displayName, a: `gastó ${fmt.format(amount)} en ${desc}`, d: Date.now()})
            });
        } catch(e) { console.error(e); }
    }

    function switchTab(t, btn) {
        activeTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTab();
    }

    function calculateBalances() {
        let balances = {};
        currentEvent.participants.forEach(p => balances[p.id] = 0);
        currentEvent.expenses.forEach(e => {
            balances[e.payerId] += e.amount;
            let share = e.amount / e.includedIds.length;
            e.includedIds.forEach(id => balances[id] -= share);
        });
        return balances;
    }

    function renderTab() {
        const area = document.getElementById('tab-area');
        if(activeTab === 'gastos') {
            area.innerHTML = currentEvent.expenses.map(e => `
                <div class="card" style="border-left:5px solid var(--accent)">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${e.desc}</b><b style="color:var(--accent)">${fmt.format(e.amount)}</b>
                    </div>
                    <small style="color:var(--muted)">Pagó ${e.payerName}</small>
                </div>`).join('');
        } else if(activeTab === 'saldos') {
            const bal = calculateBalances();
            area.innerHTML = currentEvent.participants.map(p => `
                <div class="card" style="display:flex; justify-content:space-between;">
                    <span>${p.name}</span><b style="color:${bal[p.id] >= 0 ? 'var(--green)' : 'var(--red)'}">${fmt.format(bal[p.id])}</b>
                </div>`).join('');
        } else if(activeTab === 'transfer') {
            const bal = calculateBalances();
            let deudores = [], acreedores = [];
            for(let id in bal) { 
                if(bal[id] < -0.01) deudores.push({id, amt: -bal[id]});
                if(bal[id] > 0.01) acreedores.push({id, amt: bal[id]});
            }
            let trans = [];
            deudores.forEach(d => {
                acreedores.forEach(a => {
                    if(d.amt > 0 && a.amt > 0) {
                        let move = Math.min(d.amt, a.amt);
                        trans.push(`<b>${currentEvent.participants.find(p=>p.id===d.id).name}</b> le debe <b>${fmt.format(move)}</b> a <b>${currentEvent.participants.find(p=>p.id===a.id).name}</b>`);
                        d.amt -= move; a.amt -= move;
                    }
                });
            });
            area.innerHTML = trans.map(t => `<div class="card" style="font-size:0.9rem; border-left:4px solid var(--green)">${t}</div>`).join('') || '<p style="text-align:center;">¡Todo saldado!</p>';
        } else {
            area.innerHTML = currentEvent.logs.slice().reverse().map(l => `<div style="padding:12px; border-bottom:1px solid var(--border); font-size:0.8rem; opacity:0.8;"><b>${l.u}</b> ${l.a}</div>`).join('');
        }
    }

    function shareEvent() {
        const url = window.location.origin + window.location.pathname + "?join=" + currentEvent.id;
        if(navigator.share) navigator.share({title: 'Sumate al evento ' + currentEvent.name, url});
        else prompt("Copiá el link para invitar:", url);
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { 
        document.getElementById(id).classList.remove('active');
        // Limpiamos inputs para que la próxima vez esté vacío
        document.getElementById(id).querySelectorAll('input').forEach(i => i.value = '');
    }
</script>
</body>
</html>
