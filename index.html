<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DivideGastos Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0d0f14; --surface: #161920; --surface2: #1e2230; --border: #2a2f40;
        --accent: #6c63ff; --green: #1de9b6; --red: #ff6584; --text: #e8eaf0; --muted: #7a7f99; --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; height: 70px; }
    .user-box { display: flex; align-items: center; gap: 12px; }
    .user-box img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); background: var(--surface2); }

    .container { padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; }
    
    .btn-main { width: 100%; padding: 18px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; background: var(--accent); color: white; font-size: 1rem; }
    
    #screen-loading { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .loader { width: 45px; height: 45px; border: 4px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: flex-end; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--surface); width: 100%; border-radius: 24px 24px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; }
    
    input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: white; margin-bottom: 15px; }
    .fab { position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; background: var(--accent); color: white; border-radius: 50%; border: none; font-size: 26px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 15px rgba(0,0,0,0.3); }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="screen-loading"><div class="loader"></div><p style="margin-top:15px; color:var(--muted); font-size:0.8rem;">Verificando sesión...</p></div>

<div id="screen-login" class="screen">
    <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:40px; text-align:center;">
        <i class="fa-solid fa-wallet fa-4x" style="color:var(--accent); margin-bottom:20px;"></i>
        <h1 style="font-family:'Syne'; margin-bottom:10px;">DivideGastos Pro</h1>
        <p style="color:var(--muted); margin-bottom:40px;">Tu billetera grupal en la nube.</p>
        <button class="btn-main" onclick="login()"><i class="fa-brands fa-google"></i> Entrar con Google</button>
    </div>
</div>

<div id="screen-main" class="screen">
    <header>
        <div class="user-box"><img id="h-img" src=""><span id="h-name"></span></div>
        <button onclick="logout()" style="background:none; border:none; color:var(--red); font-size:1.2rem;"><i class="fa-solid fa-power-off"></i></button>
    </header>
    <div class="container">
        <h2 style="font-family:'Syne'; margin-bottom:20px;">Mis Eventos</h2>
        <div id="event-list"></div>
    </div>
    <button class="fab" onclick="openModal('modal-new')"><i class="fa-solid fa-plus"></i></button>
</div>

<div id="modal-new" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-new')">
    <div class="modal">
        <h2 style="margin-bottom:15px;">Nuevo Evento</h2>
        <input type="text" id="new-name" placeholder="Nombre del evento">
        <button class="btn-main" id="btn-create" onclick="createEvent()">CREAR</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Fix de carga: Si en 4 segundos no hay respuesta, mostramos el login por las dudas
    const loadTimeout = setTimeout(() => {
        if (!auth.currentUser) showScreen('screen-login');
    }, 4000);

    function showScreen(id) {
        clearTimeout(loadTimeout);
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('screen-loading').style.display = 'none';
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('h-name').innerText = user.displayName.split(' ')[0];
            document.getElementById('h-img').src = user.photoURL;
            showScreen('screen-main');
            loadEvents();
        } else {
            showScreen('screen-login');
        }
    });

    async function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        try { await auth.signInWithPopup(provider); } catch(e) { alert("Error al conectar."); }
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    function loadEvents() {
        db.collection('events').where('participantsIds', 'array-contains', auth.currentUser.uid)
        .onSnapshot(snap => {
            const list = document.getElementById('event-list');
            if(snap.empty) {
                list.innerHTML = '<p style="text-align:center; padding:40px; color:var(--muted);">No hay eventos.</p>';
                return;
            }
            list.innerHTML = snap.docs.map(doc => `
                <div class="card"><b>${doc.data().name}</b></div>
            `).join('');
        });
    }

    async function createEvent() {
        const name = document.getElementById('new-name').value;
        if(!name) return;
        document.getElementById('btn-create').disabled = true;
        await db.collection('events').add({
            name, 
            participantsIds: [auth.currentUser.uid],
            participants: [{id: auth.currentUser.uid, name: auth.currentUser.displayName}],
            expenses: []
        });
        closeModal('modal-new');
        document.getElementById('btn-create').disabled = false;
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
</script>
</body>
</html>
