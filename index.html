<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DivideGastos Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --primary: #6c63ff;
    --accent: #ff6584;
    --bg: #f0f2f8;
    --text: #2d3142;
    --text-muted: #9094a8;
    --border: #e2e5f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

  .screen { display: none; flex-direction: column; min-height: 100vh; animation: fadeIn 0.3s ease; }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* LOADING */
  #screen-loading { background: linear-gradient(145deg, var(--primary), var(--accent)); justify-content: center; align-items: center; color: white; }
  .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-top: 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* LOGIN */
  #screen-onboarding { background: linear-gradient(145deg, var(--primary), var(--accent)); justify-content: center; align-items: center; padding: 20px; }
  .login-card { background: white; border-radius: 28px; padding: 40px 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
  .btn-google { width: 100%; padding: 16px; background: white; border: 2px solid var(--border); border-radius: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; margin-top: 25px; }

  /* MAIN APP */
  .app-header { background: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .user-info { display: flex; align-items: center; gap: 10px; }
  .user-info img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); }
  .logout-btn { border: none; background: #fff1f1; color: var(--accent); padding: 8px 12px; border-radius: 8px; cursor: pointer; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

  <div id="screen-loading" class="screen active">
    <i class="fa-solid fa-receipt fa-3x"></i>
    <div class="spinner"></div>
    <p id="load-msg" style="margin-top:10px">Iniciando sesión...</p>
  </div>

  <div id="screen-onboarding" class="screen">
    <div class="login-card">
      <i class="fa-solid fa-receipt fa-4x" style="color:var(--primary)"></i>
      <h1 style="margin-top:20px">DivideGastos</h1>
      <button class="btn-google" onclick="login()">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20">
        Entrar con Google
      </button>
    </div>
  </div>

  <div id="screen-main" class="screen">
    <header class="app-header">
      <div class="user-info">
        <img id="user-photo" src="" alt="">
        <strong id="user-name">Usuario</strong>
      </div>
      <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-sign-out"></i></button>
    </header>
    <div style="padding:20px">
      <h2>Mis Eventos</h2>
      <p style="color:var(--text-muted); margin-top:20px">Todavía no tenés eventos.</p>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };

    let auth;

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const target = document.getElementById('screen-' + id);
      if(target) target.classList.add('active');
    }

    function init() {
      firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();

      // 1. CAPTURAR EL RESULTADO DEL LOGIN (Esto arregla el rebote)
      auth.getRedirectResult().then((result) => {
        if (result.user) {
          console.log("Usuario detectado por redirección");
          handleUser(result.user);
        }
      }).catch((error) => {
        console.error("Error en redirección:", error);
      });

      // 2. OBSERVAR CAMBIOS DE SESIÓN (Para cuando recargás la página)
      auth.onAuthStateChanged(user => {
        if (user) {
          handleUser(user);
        } else {
          showScreen('onboarding');
        }
      });
    }

    function handleUser(user) {
      document.getElementById('user-name').innerText = user.displayName;
      document.getElementById('user-photo').src = user.photoURL;
      showScreen('main');
    }

    function login() {
      const provider = new firebase.auth.GoogleAuthProvider();
      // Forzamos el guardado de la cuenta para evitar bucles
      provider.setCustomParameters({ prompt: 'select_account' });
      showScreen('loading');
      auth.signInWithRedirect(provider);
    }

    function logout() {
      auth.signOut().then(() => {
        window.location.reload();
      });
    }

    init();
  </script>
</body>
</html>
