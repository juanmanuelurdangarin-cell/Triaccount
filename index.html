<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DivideGastos Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0d0f14; --surface: #161920; --surface2: #1e2230; --border: #2a2f40;
        --accent: #6c63ff; --accent2: #ff6584; --green: #1de9b6; --red: #ff6584;
        --text: #e8eaf0; --muted: #7a7f99; --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
    
    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; height: 70px; }
    .user-box { display: flex; align-items: center; gap: 12px; }
    .user-box img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); }

    .container { padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; cursor: pointer; }
    
    .tabs-nav { display: flex; background: var(--surface2); padding: 5px; border-radius: 14px; margin-bottom: 20px; gap: 4px; overflow-x: auto; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--muted); font-weight: 700; cursor: pointer; border-radius: 10px; font-size: 0.7rem; white-space: nowrap; }
    .tab-btn.active { background: var(--accent); color: white; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: flex-end; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--surface); width: 100%; border-radius: 24px 24px 0 0; padding: 25px; max-height: 95vh; overflow-y: auto; }
    
    input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: white; margin-bottom: 15px; font-size: 1rem; outline: none; }
    .btn-main { width: 100%; padding: 18px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; background: var(--accent); color: white; }
    .btn-main:disabled { opacity: 0.5; filter: grayscale(1); }

    .fab { position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; background: var(--accent); color: white; border-radius: 50%; border: none; font-size: 26px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); z-index: 90; display: flex; align-items: center; justify-content: center; }

    /* Estilos para la lista de participantes en el modal */
    .part-chip { display: inline-flex; align-items: center; background: var(--surface2); padding: 8px 12px; border-radius: 20px; margin: 0 8px 8px 0; font-size: 0.85rem; border: 1px solid var(--border); }
    .part-chip i { margin-left: 8px; color: var(--red); cursor: pointer; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="screen-loading" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; justify-content:center; align-items:center;"><div style="width:40px; height:40px; border:4px solid var(--surface2); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite;"></div></div>

<div id="screen-login" class="screen">
    <i class="fa-solid fa-people-group fa-4x" style="color:var(--accent); margin-bottom:20px;"></i>
    <h1 style="font-family:'Syne';">DivideGastos Pro</h1>
    <p style="color:var(--muted); margin-bottom:30px;">Iniciá sesión para sincronizar tus gastos</p>
    <button class="btn-main" onclick="login()"><i class="fa-brands fa-google"></i> Entrar con Google</button>
</div>

<div id="screen-main" class="screen">
    <header>
        <div class="user-box">
            <img id="header-img" src="">
            <span id="header-name">...</span>
        </div>
        <button onclick="logout()" style="background:none; border:none; color:var(--red); font-size:1.2rem;"><i class="fa-solid fa-power-off"></i></button>
    </header>
    <div class="container">
        <h2 style="font-family:'Syne'; margin-bottom:20px;">Mis Eventos</h2>
        <div id="event-list"></div>
    </div>
    <button class="fab" onclick="openModalCreate()"><i class="fa-solid fa-plus"></i></button>
</div>

<div id="screen-detail" class="screen">
    <header>
        <button onclick="showScreen('screen-main')" style="background:none; border:none; color:white;"><i class="fa-solid fa-chevron-left"></i></button>
        <h3 id="det-title" style="font-family:'Syne';">Evento</h3>
        <button onclick="shareEvent()" style="background:none; border:none; color:var(--accent);"><i class="fa-solid fa-user-plus"></i></button>
    </header>
    <div class="container">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('gastos', this)">GASTOS</button>
            <button class="tab-btn" onclick="switchTab('saldos', this)">SALDOS</button>
            <button class="tab-btn" onclick="switchTab('pagos', this)">PAGOS</button>
            <button class="tab-btn" onclick="switchTab('historial', this)">HISTORIAL</button>
        </div>
        <div id="tab-area"></div>
    </div>
    <button class="fab" onclick="openModal('modal-add-expense')"><i class="fa-solid fa-cart-shopping"></i></button>
</div>

<div id="modal-new-event" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-new-event')">
    <div class="modal">
        <h2 style="margin-bottom:15px;">Nuevo Evento</h2>
        <input type="text" id="new-name" placeholder="Nombre (ej: Asado Domingo)">
        
        <label style="font-size:0.8rem; color:var(--muted)">Participantes:</label>
        <div id="setup-parts-list" style="margin-top:10px;"></div>
        
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="in-part-name" placeholder="Nombre de amigo" style="margin-bottom:0;">
            <button onclick="addPartToSetup()" style="background:var(--surface2); border:1px solid var(--border); color:var(--accent); padding:0 20px; border-radius:12px; font-weight:bold;">+</button>
        </div>

        <select id="new-cur"><option value="ARS">ARS</option><option value="USD">USD</option></select>
        <button id="btn-create" class="btn-main" onclick="dbCreateEvent()">CREAR EVENTO</button>
    </div>
</div>

<div id="modal-add-expense" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-add-expense')">
    <div class="modal">
        <h2>Cargar Gasto</h2>
        <input type="text" id="ex-desc" placeholder="¿Qué compraron?">
        <input type="number" id="ex-amount" placeholder="Monto">
        <label style="font-size:0.8rem; color:var(--muted)">¿Quién pagó?</label>
        <select id="ex-payer"></select>
        <label style="font-size:0.8rem; color:var(--muted)">¿Quiénes consumieron?</label>
        <div id="ex-list" style="margin-bottom:15px; max-height:150px; overflow-y:auto;"></div>
        <button class="btn-main" onclick="dbAddExpense()">GUARDAR GASTO</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentEvent = null;
    let activeTab = 'gastos';
    let tempParticipants = []; // Para el modal de creación

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('screen-loading').style.display = 'none';
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('header-name').innerText = user.displayName.split(' ')[0];
            document.getElementById('header-img').src = user.photoURL;
            const params = new URLSearchParams(window.location.search);
            if(params.has('join')) joinEvent(params.get('join'));
            else { showScreen('screen-main'); loadEvents(); }
        } else { showScreen('screen-login'); }
    });

    async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => window.location.href = window.location.origin + window.location.pathname); }

    function openModalCreate() {
        tempParticipants = [{id: auth.currentUser.uid, name: auth.currentUser.displayName, photo: auth.currentUser.photoURL}];
        renderSetupParts();
        openModal('modal-new-event');
    }

    function addPartToSetup() {
        const input = document.getElementById('in-part-name');
        if(!input.value) return;
        tempParticipants.push({id: 'temp_' + Date.now(), name: input.value, photo: null});
        input.value = '';
        renderSetupParts();
    }

    function removePartFromSetup(id) {
        if(id === auth.currentUser.uid) return;
        tempParticipants = tempParticipants.filter(p => p.id !== id);
        renderSetupParts();
    }

    function renderSetupParts() {
        document.getElementById('setup-parts-list').innerHTML = tempParticipants.map(p => `
            <span class="part-chip">
                ${p.name} ${p.id !== auth.currentUser.uid ? `<i class="fa-solid fa-circle-xmark" onclick="removePartFromSetup('${p.id}')"></i>` : ''}
            </span>
        `).join('');
    }
