<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DivideGastos Pro | Premium Purple</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        /* Premium Purple Palette */
        --bg: #09090b;
        --surface: #121218;
        --surface2: #1c1c26;
        --border: #2d2d3d;
        --accent: #8b5cf6; 
        --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
        --accent-soft: rgba(139, 92, 246, 0.15);
        --green: #10b981;
        --red: #f43f5e;
        --text: #f8fafc;
        --muted: #94a3b8;
        --radius: 24px;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        background: var(--bg); 
        color: var(--text); 
        min-height: 100vh; 
        overflow-x: hidden;
        background-image: radial-gradient(circle at top right, rgba(139, 92, 246, 0.08), transparent 400px);
    }
    
    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    
    @keyframes slideUp { 
        from { opacity: 0; transform: translateY(20px); } 
        to { opacity: 1; transform: translateY(0); } 
    }

    header { 
        padding: 0 24px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        background: rgba(18, 18, 24, 0.8);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border); 
        position: sticky; 
        top: 0; 
        z-index: 100; 
        height: 80px; 
    }

    .user-box { display: flex; align-items: center; gap: 14px; }
    .user-box img { 
        width: 44px; 
        height: 44px; 
        border-radius: 14px;
        border: 2px solid var(--accent); 
        object-fit: cover; 
    }

    .container { padding: 24px; max-width: 600px; margin: 0 auto; width: 100%; }
    
    .card { 
        background: var(--surface); 
        border: 1px solid var(--border); 
        border-radius: var(--radius); 
        padding: 20px; 
        margin-bottom: 16px;
        transition: all 0.3s ease;
        box-shadow: var(--shadow);
    }
    .card:active { transform: scale(0.98); background: var(--surface2); }
    
    .tabs-nav { 
        display: flex; 
        background: var(--surface2); 
        padding: 6px;
        border-radius: 20px; 
        margin-bottom: 24px; 
        gap: 6px;
        overflow-x: auto;
        scrollbar-width: none;
    }
    .tab-btn { 
        flex: 1; 
        padding: 12px 6px; 
        border: none; 
        background: none; 
        color: var(--muted); 
        font-weight: 700; 
        cursor: pointer; 
        border-radius: 16px; 
        font-size: 0.7rem; 
        text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: all 0.3s;
        white-space: nowrap;
    }
    .tab-btn.active { 
        background: var(--accent-gradient); 
        color: white; 
        box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    .modal-overlay { 
        position: fixed; 
        inset: 0; 
        background: rgba(0,0,0,0.85); 
        display: none; 
        align-items: flex-end; 
        z-index: 1000; 
        padding: 12px;
        backdrop-filter: blur(8px); 
    }
    .modal-overlay.active { display: flex; }
    .modal { 
        background: var(--surface); 
        width: 100%;
        border-radius: 32px; 
        padding: 30px; 
        max-height: 90vh; 
        overflow-y: auto; 
        border: 1px solid var(--border);
        box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
    }
    
    input, select { 
        width: 100%; 
        background: var(--surface2); 
        border: 1px solid var(--border);
        padding: 18px; 
        border-radius: 18px; 
        color: white; 
        margin-bottom: 18px; 
        font-size: 1rem; 
        outline: none; 
        transition: border 0.3s;
    }
    input:focus { border-color: var(--accent); }

    .btn-main { 
        width: 100%;
        padding: 20px; 
        border-radius: 20px; 
        border: none; 
        font-weight: 800; 
        cursor: pointer; 
        background: var(--accent-gradient); 
        color: white; 
        font-size: 1.1rem; 
        text-transform: uppercase; 
        font-family: 'Outfit';
        box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
    }
    .btn-main:active { transform: scale(0.97); }

    .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .cat-btn { 
        padding: 14px; 
        background: var(--surface2); 
        border-radius: 18px; 
        border: 1px solid var(--border); 
        color: var(--muted); 
        display: flex;
        flex-direction: column; 
        align-items: center; 
        font-size: 0.7rem; 
        gap: 8px; 
        cursor: pointer;
    }
    .cat-btn.active { 
        border-color: var(--accent); 
        color: white;
        background: var(--accent-soft); 
    }

    .fab { 
        position: fixed; 
        bottom: 30px; 
        right: 25px; 
        width: 72px; 
        height: 72px; 
        background: var(--accent-gradient);
        color: white; 
        border-radius: 22px; 
        border: none; 
        font-size: 32px; 
        box-shadow: 0 15px 35px rgba(139, 92, 246, 0.4); 
        z-index: 90; 
        display: flex;
        align-items: center; 
        justify-content: center; 
        transform: rotate(45deg);
    }
    .fab i { transform: rotate(-45deg); }

    .loader { 
        width: 50px; 
        height: 50px; 
        border: 4px solid var(--surface2);
        border-top-color: var(--accent); 
        border-radius: 50%; 
        animation: spin 0.8s linear infinite; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="screen-loading" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; justify-content:center; align-items:center;">
    <div class="loader"></div>
</div>

<div id="screen-login" class="screen">
    <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:40px; text-align:center;">
        <div style="width:100px; height:100px; background:var(--accent-gradient); border-radius:30px; display:flex; align-items:center; justify-content:center; margin-bottom:30px; transform:rotate(10deg); box-shadow:0 20px 40px rgba(139,92,246,0.3);">
            <i class="fa-solid fa-crown fa-3x" style="color:white; transform:rotate(-10deg);"></i>
        </div>
        <h1 style="font-family:'Outfit'; font-size:3.5rem; font-weight:800; line-height:0.9; letter-spacing:-2px;">Divide<br><span style="color:var(--accent)">PREMIUM</span></h1>
        <p style="color:var(--muted); margin-top:15px; font-size:1.1rem;">Gestión de gastos de alto nivel.</p>
        <button class="btn-main" style="margin-top:50px;" onclick="login()">
            <i class="fa-brands fa-google" style="margin-right:10px;"></i> Ingresar con Google
        </button>
    </div>
</div>

<div id="screen-main" class="screen">
    <header>
        <div class="user-box">
            <img id="header-img" src="">
            <span id="header-name" style="font-weight:800; font-family:'Outfit'; font-size:1.1rem;">...</span>
        </div>
        <button onclick="logout()" style="background:var(--surface2); border:none; color:var(--muted); width:40px; height:40px; border-radius:12px;"><i class="fa-solid fa-power-off"></i></button>
    </header>
    <div class="container">
        <h2 style="font-family:'Outfit'; margin-bottom:25px; font-size:1.8rem;">Mis Eventos</h2>
        <div id="event-list"></div>
    </div>
    <button class="fab" onclick="openModalCreate()"><i class="fa-solid fa-plus"></i></button>
</div>

<div id="screen-detail" class="screen">
    <header>
        <button onclick="showScreen('screen-main')" style="background:var(--surface2); border:none; color:white; width:40px; height:40px; border-radius:12px;"><i class="fa-solid fa-chevron-left"></i></button>
        <h3 id="det-title" style="font-family:'Outfit'; flex:1; text-align:center; font-size:1.2rem; padding:0 15px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;">...</h3>
        <div style="display:flex; gap:10px;">
            <button onclick="openModal('modal-manage-participants')" style="background:none; border:none; color:var(--text); font-size:1.2rem;"><i class="fa-solid fa-user-plus"></i></button>
            <button onclick="shareEvent()" style="background:none; border:none; color:var(--accent); font-size:1.2rem;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </header>
    <div class="container">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('gastos', this)">Gastos</button>
            <button class="tab-btn" onclick="switchTab('saldos', this)">Saldos</button>
            <button class="tab-btn" onclick="switchTab('transfer', this)">Cuentas</button>
            <button class="tab-btn" onclick="switchTab('historial', this)">Log</button>
        </div>
        <div id="tab-area"></div>
    </div>
    <button class="fab" id="fab-detail" onclick="openExpenseModal()"><i class="fa-solid fa-receipt"></i></button>
</div>

<div id="modal-event" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-event')">
    <div class="modal">
        <h2 id="event-modal-title" style="font-family:'Outfit'; margin-bottom:25px; font-size:1.8rem;">Nuevo Evento</h2>
        <input type="text" id="ev-name" placeholder="Nombre del evento">
        <input type="date" id="ev-date" style="color-scheme: dark;">
        <div id="setup-parts-list" style="margin-bottom:20px; display:flex; flex-wrap:wrap; gap:10px;"></div>
        <div id="setup-parts-input-container">
            <input type="text" id="ev-part-name" placeholder="Nombre amigo + Enter" onkeypress="if(event.key==='Enter')addPartToSetup()">
        </div>
        <button class="btn-main" id="btn-save-event" onclick="dbSaveEvent()">Confirmar Evento</button>
        <button id="btn-delete-event" onclick="dbDeleteEventDirect()" style="display:none; width:100%; margin-top:25px; background:none; border:none; color:var(--red); font-weight:700; letter-spacing:1px;">ELIMINAR EVENTO</button>
    </div>
</div>

<div id="modal-add-expense" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-add-expense')">
    <div class="modal">
        <h2 id="expense-modal-title" style="margin-bottom:25px; font-family:'Outfit';">Registrar Gasto</h2>
        <div class="cat-grid">
            <div class="cat-btn" onclick="selectCat('🛒')">🛒<br>Súper</div>
            <div class="cat-btn" onclick="selectCat('🍔')">🍔<br>Comida</div>
            <div class="cat-btn" onclick="selectCat('🍺')">🍺<br>Drinks</div>
            <div class="cat-btn" onclick="selectCat('🏠')">🏠<br>Casa</div>
        </div>
        <input type="text" id="ex-desc" placeholder="¿Qué se compró?">
        <input type="number" id="ex-amount" placeholder="Monto total ($)" step="0.01">
        <p style="font-size:0.8rem; color:var(--muted); margin-bottom:10px; font-weight:600;">¿Quién pagó?</p>
        <select id="ex-payer"></select>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <p style="font-size:0.8rem; color:var(--muted); font-weight:600;">Participantes</p>
            <button onclick="toggleAllChecks()" style="background:none; border:none; color:var(--accent); font-size:0.75rem; font-weight:800;">MARCAR TODOS</button>
        </div>
        <div id="ex-list-checks" style="margin-bottom:30px;"></div>
        <button class="btn-main" id="btn-save-expense" onclick="dbSaveExpense()">Guardar Gasto</button>
        <button id="btn-delete-expense" onclick="dbDeleteExpense()" style="display:none; width:100%; margin-top:25px; background:none; border:none; color:var(--red); font-weight:700;">ELIMINAR GASTO</button>
    </div>
</div>

<div id="modal-manage-participants" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-manage-participants')">
    <div class="modal">
        <h2 style="font-family:'Outfit'; margin-bottom:25px;">Integrantes</h2>
        <div id="manage-parts-list" style="margin-bottom:25px; display:flex; flex-direction:column; gap:12px;"></div>
        <input type="text" id="add-new-part-name" placeholder="Nuevo integrante + Enter..." onkeypress="if(event.key==='Enter')addNewParticipantDirect()">
        <button class="btn-main" style="background:var(--surface2); box-shadow:none; color:var(--muted);" onclick="closeModal('modal-manage-participants')">Cerrar</button>
    </div>
</div>

<script>
    // Configuración Firebase [cite: 54]
    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const fmt = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' });
    let currentEvent = null, activeTab = 'gastos', tempParticipants = [], editingExpenseId = null, editingEventId = null, selectedCat = '🛒';

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('screen-loading').style.display = 'none';
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('header-name').innerText = user.displayName.split(' ')[0];
            document.getElementById('header-img').src = user.photoURL;
            showScreen('screen-main');
            loadEvents();
        } else { showScreen('screen-login'); }
    });

    async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }

    function loadEvents() {
        db.collection('events').where('participantsIds', 'array-contains', auth.currentUser.uid)
        .onSnapshot(snap => {
            const list = document.getElementById('event-list');
            list.innerHTML = snap.empty ? '<p style="text-align:center; padding:40px; opacity:0.5;">Sin eventos activos.</p>' : 
            snap.docs.map(doc => {
                const d = doc.data();
                const eventDataStr = JSON.stringify(d).replace(/'/g, "&apos;");
                return `
                <div class="card" onclick="openEvent('${doc.id}')">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <h4 style="font-family:'Outfit'; color:white; font-size:1.2rem;">${d.name}</h4>
                            <p style="color:var(--muted); font-size:0.8rem; margin-top:6px;"><i class="fa-regular fa-calendar-days" style="margin-right:6px"></i>${d.date ? d.date.split('-').reverse().join('/') : 'Sin fecha'}</p>
                        </div>
                        <button onclick="event.stopPropagation(); openEditEvent('${doc.id}', ${eventDataStr})" style="background:var(--surface2); border:none; color:var(--muted); width:35px; height:35px; border-radius:10px;"><i class="fa-solid fa-ellipsis"></i></button>
                    </div>
                </div>`;
            }).join('');
        });
    }

    function openModalCreate() {
        editingEventId = null;
        document.getElementById('event-modal-title').innerText = "Nuevo Evento";
        document.getElementById('btn-delete-event').style.display = "none";
        document.getElementById('setup-parts-input-container').style.display = "block";
        document.getElementById('ev-name').value = "";
        document.getElementById('ev-date').value = "";
        tempParticipants = [{id: auth.currentUser.uid, name: auth.currentUser.displayName}];
        renderSetupParts();
        openModal('modal-event');
    }

    function openEditEvent(id, data) {
        editingEventId = id;
        document.getElementById('event-modal-title').innerText = "Editar Evento";
        document.getElementById('ev-name').value = data.name;
        document.getElementById('ev-date').value = data.date || "";
        document.getElementById('btn-delete-event').style.display = "block";
        document.getElementById('setup-parts-input-container').style.display = "none";
        document.getElementById('setup-parts-list').innerHTML = "";
        openModal('modal-event');
    }

    function addPartToSetup() {
        const inp = document.getElementById('ev-part-name');
        if(!inp.value.trim()) return;
        tempParticipants.push({id: 't_' + Date.now(), name: inp.value.trim()});
        inp.value = '';
        renderSetupParts();
    }

    function renderSetupParts() {
        document.getElementById('setup-parts-list').innerHTML = tempParticipants.map((p, i) => `
            <div style="background:var(--accent-soft); color:var(--accent); padding:10px 15px; border-radius:14px; font-weight:700; font-size:0.85rem; display:flex; gap:10px; align-items:center; border: 1px solid rgba(139,92,246,0.3);">
                ${p.name} ${i > 0 ? `<i class="fa-solid fa-circle-xmark" onclick="tempParticipants.splice(${i},1);renderSetupParts()"></i>` : ''}
            </div>
        `).join('');
    }

    async function dbSaveEvent() {
        const name = document.getElementById('ev-name').value, date = document.getElementById('ev-date').value;
        if(!name) return alert("¡Dale un nombre al evento!");
        if(editingEventId) {
            await db.collection('events').doc(editingEventId).update({ name, date });
        } else {
            await db.collection('events').add({
                name, date, participantsIds: tempParticipants.map(p => p.id), participants: tempParticipants, expenses: [],
                logs: [{u: auth.currentUser.displayName, a: "creó el evento", d: Date.now()}]
            });
        }
        closeModal('modal-event');
    }

    async function dbDeleteEventDirect() {
        if(confirm("¿Eliminar este evento permanentemente?")) {
            await db.collection('events').doc(editingEventId).delete();
            closeModal('modal-event');
        }
    }

    function openEvent(id) {
        db.collection('events').doc(id).onSnapshot(doc => {
            if(!doc.exists) return;
            currentEvent = {id: doc.id, ...doc.data()};
            document.getElementById('det-title').innerText = currentEvent.name;
            renderTab();
            renderManageParticipants();
            showScreen('screen-detail');
        });
    }

    async function removeParticipant(id) {
        if(!confirm("Se borrarán los gastos de este integrante para no romper saldos. ¿Seguro?")) return;
        const newParts = currentEvent.participants.filter(p => p.id !== id);
        const newIds = currentEvent.participantsIds.filter(pid => pid !== id);
        const newExpenses = currentEvent.expenses.filter(e => e.payerId !== id && !e.includedIds.includes(id));
        await db.collection('events').doc(currentEvent.id).update({ 
            participants: newParts, 
            participantsIds: newIds,
            expenses: newExpenses,
            logs: firebase.firestore.FieldValue.arrayUnion({u: "Sistema", a: "removió un integrante", d: Date.now()})
        });
    }

    function selectCat(cat) {
        selectedCat = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(cat)));
    }

    function toggleAllChecks() {
        const checks = document.querySelectorAll('.ex-check');
        const anyUnchecked = Array.from(checks).some(c => !c.checked);
        checks.forEach(c => c.checked = anyUnchecked);
    }

    function openExpenseModal(expense = null) {
        editingExpenseId = expense ? expense.id : null;
        document.getElementById('expense-modal-title').innerText = expense ? "Editar Gasto" : "Nuevo Gasto";
        document.getElementById('btn-delete-expense').style.display = expense ? "block" : "none";
        document.getElementById('ex-desc').value = expense ? expense.desc : "";
        document.getElementById('ex-amount').value = expense ? expense.amount : "";
        selectCat(expense ? expense.cat || '🛒' : '🛒');
        document.getElementById('ex-payer').innerHTML = currentEvent.participants.map(p => `<option value="${p.id}" ${expense && expense.payerId === p.id ? 'selected' : ''}>${p.name}</option>`).join('');
        document.getElementById('ex-list-checks').innerHTML = currentEvent.participants.map(p => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:16px; background:var(--surface2); border-radius:16px; margin-bottom:10px;">
                <span style="font-weight:600;">${p.name}</span>
                <input type="checkbox" value="${p.id}" class="ex-check" style="width:22px; height:22px; accent-color:var(--accent); margin:0;" ${!expense || expense.includedIds.includes(p.id) ? 'checked' : ''}>
            </div>
        `).join('');
        openModal('modal-add-expense');
    }

    async function dbSaveExpense() {
        const desc = document.getElementById('ex-desc').value, amount = parseFloat(document.getElementById('ex-amount').value);
        if(!desc || isNaN(amount) || amount <= 0) return alert("Descripción o monto inválidos");
        const included = Array.from(document.querySelectorAll('.ex-check:checked')).map(c => c.value);
        if(included.length === 0) return alert("¿Quiénes participan del gasto?");
        
        const payerId = document.getElementById('ex-payer').value;
        let newExpenses = [...currentEvent.expenses];
        const expData = { 
            id: editingExpenseId || Date.now(), desc, amount: Number(amount.toFixed(2)), cat: selectedCat,
            payerId, includedIds: included, payerName: currentEvent.participants.find(p=>p.id===payerId).name, d: Date.now() 
        };
        if(editingExpenseId) newExpenses = newExpenses.map(e => e.id === editingExpenseId ? expData : e);
        else newExpenses.push(expData);
        closeModal('modal-add-expense');
        await db.collection('events').doc(currentEvent.id).update({ expenses: newExpenses });
    }

    async function dbDeleteExpense() {
        if(!confirm("¿Borrar este gasto?")) return;
        const newExpenses = currentEvent.expenses.filter(e => e.id !== editingExpenseId);
        closeModal('modal-add-expense');
        await db.collection('events').doc(currentEvent.id).update({ expenses: newExpenses });
    }

    function renderTab() {
        const area = document.getElementById('tab-area');
        if(activeTab === 'gastos') {
            area.innerHTML = currentEvent.expenses.slice().reverse().map(e => `
                <div class="card" onclick='openExpenseModal(${JSON.stringify(e).replace(/'/g, "&apos;")})' style="border-left:5px solid var(--accent)">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <div style="font-size:1.5rem; background:var(--surface2); width:50px; height:50px; display:flex; align-items:center; justify-content:center; border-radius:15px;">${e.cat || '🛒'}</div>
                            <div>
                                <b style="font-size:1.1rem; display:block;">${e.desc}</b>
                                <span style="opacity:0.6; font-size:0.75rem;">Pagó ${e.payerName}</span>
                            </div>
                        </div>
                        <b style="color:var(--accent); font-size:1.1rem;">${fmt.format(e.amount)}</b>
                    </div>
                </div>`).join('') || '<p style="text-align:center; opacity:0.5; padding:40px;">No hay gastos.</p>';
        } else if(activeTab === 'saldos') {
            const bal = calculateBalances();
            area.innerHTML = currentEvent.participants.map(p => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:700; font-size:1.1rem;">${p.name}</span>
                    <b style="font-size:1.1rem; color:${bal[p.id] >= 0.01 ? 'var(--green)' : bal[p.id] <= -0.01 ? 'var(--red)' : 'var(--muted)'}">${fmt.format(bal[p.id])}</b>
                </div>`).join('');
        } else if(activeTab === 'transfer') {
            const bal = calculateBalances();
            let deudores = [], acreedores = [];
            for(let id in bal) { 
                if(bal[id] < -0.01) deudores.push({id, amt: -bal[id]});
                if(bal[id] > 0.01) acreedores.push({id, amt: bal[id]});
            }
            let trans = [];
            deudores.forEach(d => {
                acreedores.forEach(a => {
                    if(d.amt > 0.01 && a.amt > 0.01) {
                        let move = Math.min(d.amt, a.amt);
                        trans.push(`<b>${currentEvent.participants.find(p=>p.id===d.id).name}</b> paga <br><span style="color:var(--green); font-size:1.2rem;">${fmt.format(move)}</span><br> a <b>${currentEvent.participants.find(p=>p.id===a.id).name}</b>`);
                        d.amt -= move; a.amt -= move;
                    }
                });
            });
            area.innerHTML = trans.map(t => `<div class="card" style="border-left:5px solid var(--green); line-height:1.6;">${t}</div>`).join('') || '<div class="card" style="text-align:center; color:var(--green); font-weight:800;">✨ ¡CUENTAS SALDADAS! ✨</div>';
        } else {
            area.innerHTML = currentEvent.logs.slice().reverse().map(l => `<div style="padding:15px; border-bottom:1px solid var(--border); font-size:0.85rem; color:var(--muted);"><b>${l.u}</b> ${l.a}</div>`).join('');
        }
    }

    function calculateBalances() {
        let balances = {};
        currentEvent.participants.forEach(p => balances[p.id] = 0);
        currentEvent.expenses.forEach(e => {
            balances[e.payerId] += e.amount;
            let share = e.amount / e.includedIds.length;
            e.includedIds.forEach(id => { if(balances.hasOwnProperty(id)) balances[id] -= share; });
        });
        return balances;
    }

    function renderManageParticipants() {
        const list = document.getElementById('manage-parts-list');
        list.innerHTML = currentEvent.participants.map(p => `
            <div style="display:flex; justify-content:space-between; align-items:center; background:var(--surface2); padding:18px; border-radius:20px; border:1px solid var(--border);">
                <span style="font-weight:700;">${p.name}</span>
                ${p.id !== auth.currentUser.uid ? `<button onclick="removeParticipant('${p.id}')" style="background:rgba(244,63,94,0.1); border:none; color:var(--red); width:35px; height:35px; border-radius:10px;"><i class="fa-solid fa-trash"></i></button>` : '<small style="color:var(--accent); font-weight:800; text-transform:uppercase; font-size:0.6rem; letter-spacing:1px;">Tú</small>'}
            </div>
        `).join('');
    }

    async function addNewParticipantDirect() {
        const inp = document.getElementById('add-new-part-name');
        if(!inp.value.trim()) return;
        const newPart = {id: 't_' + Date.now(), name: inp.value.trim()};
        await db.collection('events').doc(currentEvent.id).update({
            participants: firebase.firestore.FieldValue.arrayUnion(newPart),
            participantsIds: firebase.firestore.FieldValue.arrayUnion(newPart.id)
        });
        inp.value = '';
    }

    function switchTab(t, btn) {
        activeTab = t;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTab();
    }

    function shareEvent() {
        const url = window.location.origin + window.location.pathname + "?join=" + currentEvent.id;
        if(navigator.share) navigator.share({title: 'Invitación a ' + currentEvent.name, url});
        else prompt("Copia este link:", url);
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
</script>
</body>
</html>
