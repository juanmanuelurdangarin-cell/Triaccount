<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DivideGastos Pro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0d0f14; --surface: #161920; --surface2: #1e2230; --border: #2a2f40;
        --accent: #6c63ff; --accent2: #ff6584; --green: #1de9b6; --red: #ff6584;
        --text: #e8eaf0; --muted: #7a7f99; --pedidosya: #ff0045; --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
    
    /* PANTALLAS */
    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* HEADER PRO */
    header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .user-pill { display: flex; align-items: center; gap: 10px; background: var(--surface2); padding: 5px 15px; border-radius: 30px; border: 1px solid var(--border); }
    .user-pill img { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--accent); }

    /* CARDS */
    .container { padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; }
    .event-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; position: relative; }
    .event-card:active { transform: scale(0.97); }
    .event-card::before { content: ''; position: absolute; left: 0; top: 15%; bottom: 15%; width: 4px; background: var(--accent); border-radius: 0 4px 4px 0; }
    
    /* TABS DEL .TXT ORIGINAL */
    .tabs-nav { display: flex; background: var(--surface2); padding: 5px; border-radius: 14px; margin-bottom: 20px; gap: 5px; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--muted); font-weight: 700; cursor: pointer; border-radius: 10px; transition: 0.2s; font-size: 0.85rem; }
    .tab-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 10px rgba(108,99,255,0.3); }

    /* BOTONES Y MODALES */
    .fab { position: fixed; bottom: 30px; right: 25px; width: 64px; height: 64px; background: var(--accent); color: white; border-radius: 50%; border: none; font-size: 26px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 90; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: flex-end; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--surface); width: 100%; border-radius: 24px 24px 0 0; padding: 30px 20px; transform: translateY(0); animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 18px; border-radius: 14px; color: white; margin-bottom: 20px; font-size: 1rem; outline: none; }
    .btn-block { width: 100%; padding: 18px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; font-size: 1rem; background: var(--accent); color: white; }

    /* LOADING SCREEN */
    #screen-loading { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .loader { width: 48px; height: 48px; border: 5px solid var(--surface2); border-bottom-color: var(--accent); border-radius: 50%; animation: rotation 1s linear infinite; }
    @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="screen-loading"><div class="loader"></div><p style="margin-top:20px; color:var(--muted); font-weight:bold;">Sincronizando...</p></div>

<div id="screen-auth" class="screen">
    <div style="margin: auto; text-align: center; padding: 40px; width: 100%; max-width: 400px;">
        <i class="fa-solid fa-receipt fa-4x" style="color:var(--accent); margin-bottom:20px"></i>
        <h1 style="font-family:'Syne'; font-size: 2.8rem; margin-bottom: 10px;">DivideGastos</h1>
        <p style="color:var(--muted); margin-bottom:40px;">Argentina • Internacional • Pro</p>
        <button onclick="login()" style="width:100%; padding:20px; border-radius:16px; border:none; background:white; color:black; font-weight:800; display:flex; align-items:center; justify-content:center; gap:12px; cursor:pointer; box-shadow: 0 4px 15px rgba(255,255,255,0.1);">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="22"> Entrar con Google
        </button>
    </div>
</div>

<div id="screen-main" class="screen">
    <header>
        <div class="user-pill"><img id="user-photo" src=""><span id="user-name">Cargando...</span></div>
        <button onclick="logout()" style="background:none; border:none; color:var(--red); font-size:1.3rem;"><i class="fa-solid fa-power-off"></i></button>
    </header>
    <div class="container">
        <h2 style="font-family:'Syne'; font-size: 2rem; margin-bottom: 25px;">Mis Eventos</h2>
        <div id="event-list"></div>
    </div>
    <button class="fab" onclick="openModal('modal-new-event')"><i class="fa-solid fa-plus"></i></button>
</div>

<div id="screen-detail" class="screen">
    <header>
        <button onclick="showScreen('screen-main')" style="background:none; border:none; color:white; font-size:1.2rem;"><i class="fa-solid fa-chevron-left"></i></button>
        <h3 id="detail-title" style="font-family:'Syne'; font-size:1.2rem;">Detalle</h3>
        <button onclick="shareEvent()" style="background:none; border:none; color:var(--accent); font-size:1.2rem;"><i class="fa-solid fa-paper-plane"></i></button>
    </header>
    <div class="container">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('gastos', this)">GASTOS</button>
            <button class="tab-btn" onclick="switchTab('saldos', this)">SALDOS</button>
            <button class="tab-btn" onclick="switchTab('historial', this)">HISTORIAL</button>
        </div>
        <div id="tab-content-area"></div>
    </div>
    <button class="fab" onclick="alert('Próximamente: Formulario de Gasto')"><i class="fa-solid fa-cart-plus"></i></button>
</div>

<div id="modal-new-event" class="modal-overlay" onclick="if(event.target==this)closeModal('modal-new-event')">
    <div class="modal">
        <h2 style="font-family:'Syne'; margin-bottom:25px;">Nuevo Evento</h2>
        <input type="text" id="in-name" placeholder="Ej: Asado con los pibes">
        <select id="in-currency">
            <option value="ARS">Pesos Argentinos (ARS)</option>
            <option value="USD">Dólares (USD)</option>
            <option value="EUR">Euros (EUR)</option>
        </select>
        <button class="btn-block" onclick="dbCreateEvent()">CREAR EVENTO</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyApUtaEOhMGQFMrHIzaypRX_GLx2cace_A",
      authDomain: "dividirgastosar.firebaseapp.com",
      projectId: "dividirgastosar",
      storageBucket: "dividirgastosar.firebasestorage.app",
      messagingSenderId: "1073347556736",
      appId: "1:1073347556736:web:d98c2c848cf73c7148bd65"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentEvent = null;

    // --- SISTEMA ANTITRABA ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(id);
        if(target) target.classList.add('active');
        document.getElementById('screen-loading').style.display = 'none';
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('user-name').innerText = user.displayName.split(' ')[0];
            document.getElementById('user-photo').src = user.photoURL;
            
            // Si hay un link de unión, lo procesamos
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.has('join')) {
                joinEvent(urlParams.get('join'));
            } else {
                showScreen('screen-main');
                loadEvents();
            }
        } else {
            showScreen('screen-auth');
        }
    });

    // --- LOGICA DE NEGOCIO ---
    async function login() { 
        try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); } 
        catch(e) { alert("Error al entrar: " + e.message); }
    }
    
    function logout() { auth.signOut(); window.location.href = window.location.pathname; }

    function loadEvents() {
        db.collection('events')
          .where('participantsIds', 'array-contains', auth.currentUser.uid)
          .onSnapshot(snap => {
            const list = document.getElementById('event-list');
            if (snap.empty) {
                list.innerHTML = `<div style="text-align:center; padding:50px; color:var(--muted);">No tenés eventos activos.<br>Tocá el + para empezar.</div>`;
                return;
            }
            list.innerHTML = snap.docs.map(doc => {
                const d = doc.data();
                return `
                <div class="event-card" onclick="openDetail('${doc.id}')">
                    <div style="font-size:0.7rem; color:var(--accent); font-weight:800; margin-bottom:8px; letter-spacing:1px;">
                        ${d.ownerId === auth.currentUser.uid ? 'DUEÑO' : 'INVITADO POR ' + d.ownerName.toUpperCase()}
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="font-weight:700; font-size:1.1rem;">${d.name}</div>
                        <div style="background:var(--surface2); padding:4px 10px; border-radius:8px; font-weight:800; font-size:0.8rem; color:var(--green);">${d.currency}</div>
                    </div>
                </div>`;
            }).join('');
        }, err => {
            console.error(err);
            alert("Error de conexión. Verificá tu internet o las reglas de Firebase.");
        });
    }

    async function dbCreateEvent() {
        const name = document.getElementById('in-name').value;
        const cur = document.getElementById('in-currency').value;
        if(!name) return;

        const user = auth.currentUser;
        const newEv = {
            name: name, currency: cur,
            ownerId: user.uid, ownerName: user.displayName,
            participantsIds: [user.uid],
            participants: [{id: user.uid, name: user.displayName, photo: user.photoURL}],
            expenses: [],
            logs: [{u: user.displayName, a: "creó el evento", d: Date.now()}],
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        const doc = await db.collection('events').add(newEv);
        closeModal('modal-new-event');
        openDetail(doc.id);
    }

    function openDetail(id) {
        db.collection('events').doc(id).onSnapshot(doc => {
            if(!doc.exists) return;
            currentEvent = {id: doc.id, ...doc.data()};
            document.getElementById('detail-title').innerText = currentEvent.name;
            showScreen('screen-detail');
            switchTab('gastos', document.querySelector('.tab-btn'));
        });
    }

    function switchTab(type, el) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        const cont = document.getElementById('tab-content-area');
        
        if(type === 'gastos') {
            cont.innerHTML = currentEvent.expenses.length === 0 
                ? '<div style="text-align:center; padding:60px; color:var(--muted);"><i class="fa-solid fa-receipt fa-3x" style="margin-bottom:15px; opacity:0.2;"></i><br>Aún no hay gastos cargados.</div>' 
                : 'Renderizando gastos...';
        } else if(type === 'historial') {
            cont.innerHTML = currentEvent.logs.slice().reverse().map(l => `
                <div style="padding:15px 0; border-bottom:1px solid var(--border); font-size:0.85rem;">
                    <span style="color:var(--accent); font-weight:bold;">${l.u}</span> ${l.a}
                    <div style="color:var(--muted); font-size:0.7rem; margin-top:4px;">${new Date(l.d).toLocaleString()}</div>
                </div>
            `).join('');
        }
    }

    async function joinEvent(id) {
        const ref = db.collection('events').doc(id);
        const doc = await ref.get();
        if(doc.exists) {
            const d = doc.data();
            if(!d.participantsIds.includes(auth.currentUser.uid)) {
                await ref.update({
                    participantsIds: firebase.firestore.FieldValue.arrayUnion(auth.currentUser.uid),
                    participants: firebase.firestore.FieldValue.arrayUnion({
                        id: auth.currentUser.uid, name: auth.currentUser.displayName, photo: auth.currentUser.photoURL
                    }),
                    logs: firebase.firestore.FieldValue.arrayUnion({
                        u: auth.currentUser.displayName, a: "se unió al grupo", d: Date.now()
                    })
                });
            }
            window.history.replaceState({}, '', window.location.pathname);
            openDetail(id);
        }
    }

    function shareEvent() {
        const url = window.location.origin + window.location.pathname + "?join=" + currentEvent.id;
        if(navigator.share) navigator.share({title: 'Sumate a ' + currentEvent.name, url: url});
        else prompt("Copiá este link para tus amigos:", url);
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
</script>
</body>
</html>
